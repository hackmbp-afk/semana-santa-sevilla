{% extends 'base.html' %}
{% block content %}

<h2>Hermandades</h2>

<form method="POST" action="/add_hermandad">
    <input name="nombre" placeholder="Nombre" class="form-control mb-2">
    <input name="barrio" placeholder="Barrio" class="form-control mb-2">
    <button class="btn btn-success">Añadir</button>
</form>

<table class="table mt-3">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Barrio</th>
<th>Acciones</th>
</tr>

{% for h in data %}
<tr>
<td>{{ h[0] }}</td>
<td>{{ h[1] }}</td>
<td>{{ h[2] }}</td>
<td>
    <a href="/hermandad/{{ h[0] }}" class="btn btn-info btn-sm">Ver</a>
    <a href="/delete_hermandad/{{ h[0] }}" class="btn btn-danger btn-sm">Eliminar</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
